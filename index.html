<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaseCraft | Viral Korean 'Ins' Style Cases</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        [x-cloak] { display: none !important; }
        .cart-drawer { transition: transform 0.3s ease-in-out; }
        .dot-pattern { background-image: radial-gradient(#E9D5FF 20%, transparent 20%), radial-gradient(#DCFCE7 20%, transparent 20%); background-position: 0 0, 20px 20px; background-size: 40px 40px; }
        .ins-gradient { background: linear-gradient(135deg, #FDFCFB 0%, #F5F3FF 100%); }
        .product-card { border-radius: 2.5rem; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:hover { transform: translateY(-10px) scale(1.02); }
    </style>
</head>
<body class="bg-[#FCFBFF]" x-data="shopApp()">

    <!-- Navigation -->
    <nav class="fixed w-full bg-white/80 backdrop-blur-xl z-40 border-b border-purple-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#" class="flex items-center space-x-3">
                <img src="https://henryng808.github.io/casecraft-store/assets/logo.png" alt="CaseCraft Logo" class="h-10 w-10 rounded-xl shadow-sm">
                <div class="text-2xl font-bold tracking-tighter text-gray-900 italic uppercase">CASE<span class="text-purple-500">CRAFT</span></div>
            </a>
            <div class="flex items-center space-x-6">
                <button @click="cartOpen = true" class="relative p-2 bg-purple-50 rounded-full text-purple-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span x-show="cart.length > 0" x-text="cart.length" class="absolute -top-1 -right-1 bg-pink-500 text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-white"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="pt-32 pb-20 ins-gradient relative overflow-hidden text-center lg:text-left">
        <div class="absolute inset-0 dot-pattern opacity-30"></div>
        <div class="container mx-auto px-4 flex flex-col lg:flex-row items-center relative z-10">
            <div class="lg:w-1/2 mb-16 lg:mb-0">
                <div class="inline-flex items-center space-x-2 bg-white px-4 py-2 rounded-full shadow-sm mb-6 border border-purple-100">
                    <span class="flex h-2 w-2 rounded-full bg-green-400"></span>
                    <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">In Stock & Ready to Ship</span>
                </div>
                <h1 class="text-6xl lg:text-8xl font-extrabold text-gray-900 leading-[0.9] mb-8">
                    The Real.<br>The Viral.<br><span class="text-purple-500">Ins Series.</span>
                </h1>
                <p class="text-xl text-gray-500 mb-10 max-w-lg mx-auto lg:mx-0">
                    Straight from the 1688 workshop to your door. Featuring authentic IMD craftsmanship and the original 360° rotating invisible stand.
                </p>
                <div class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-6 justify-center lg:justify-start">
                    <a href="#products" class="bg-purple-600 text-white px-10 py-5 rounded-[2rem] font-bold text-lg hover:bg-purple-700 shadow-xl transition">Shop Real Collection</a>
                </div>
            </div>
            <div class="lg:w-1/2 flex justify-center">
                <img src="https://henryng808.github.io/casecraft-store/assets/hero.jpg" alt="Real Product Photo" class="relative z-10 w-full max-w-md rounded-[4rem] shadow-2xl transform rotate-6 border-[12px] border-white">
            </div>
        </div>
    </section>

    <!-- Product Grid -->
    <section id="products" class="py-24">
        <div class="container mx-auto px-4">
            <h2 class="text-4xl font-extrabold text-gray-900 tracking-tight text-center mb-16 uppercase">Authentic Contrast Series</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
                <template x-for="product in products" :key="product.id">
                    <div class="product-card group bg-white p-5 border border-purple-50 shadow-sm hover:shadow-2xl transition-all">
                        <div class="relative aspect-square rounded-[2rem] overflow-hidden bg-[#F9F8FF] mb-6">
                            <img :src="product.image" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        </div>
                        <a :href="'product-detail.html?id=' + product.id" class="block text-center">
                            <h3 class="text-lg font-bold text-gray-900 mb-1" x-text="product.name"></h3>
                            <div class="flex justify-center items-center space-x-2">
                                <span class="text-xl font-black text-purple-600" x-text="'$' + product.price"></span>
                                <span class="text-xs text-green-500 font-bold tracking-widest uppercase">Verified Real</span>
                            </div>
                        </a>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <script>
        function shopApp() {
            return {
                cartOpen: false,
                cart: JSON.parse(localStorage.getItem('cart') || '[]'),
                products: [
                    { id: 1, name: 'Orange Contrast Rotate', price: 24.90, image: 'https://henryng808.github.io/casecraft-store/assets/sku_orange.jpg' },
                    { id: 2, name: 'Blue Contrast Rotate', price: 24.90, image: 'https://henryng808.github.io/casecraft-store/assets/sku_blue.jpg' },
                    { id: 3, name: 'Green Contrast Rotate', price: 24.90, image: 'https://henryng808.github.io/casecraft-store/assets/sku_green.jpg' },
                    { id: 4, name: 'Mint Contrast Rotate', price: 24.90, image: 'https://henryng808.github.io/casecraft-store/assets/sku_mint.jpg' },
                    { id: 5, name: 'Mirror Bowknot Series', price: 22.80, image: 'https://henryng808.github.io/casecraft-store/assets/series-mirror-bow.jpg' },
                    { id: 6, name: 'Blue Floral Charm', price: 19.50, image: 'https://henryng808.github.io/casecraft-store/assets/series-blue-floral.jpg' },
                    { id: 7, name: 'Sweet Pink Pearl', price: 26.00, image: 'https://henryng808.github.io/casecraft-store/assets/series-sweet-pink.jpg' },
                    { id: 8, name: 'Checkered Vibe Bow', price: 21.90, image: 'https://henryng808.github.io/casecraft-store/assets/series-checkered-bow.jpg' },
                    { id: 9, name: 'Smiley Polka Chain', price: 26.50, image: 'https://henryng808.github.io/casecraft-store/assets/prod-smiley-dots.png' }
                ],
                cartTotal() { return this.cart.reduce((t, i) => t + i.price, 0).toFixed(2); },
                goToCheckout() { window.location.href = 'checkout.html'; }
            }
        }
    </script>
</body>
</html>
