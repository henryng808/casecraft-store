<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | CaseCraft Secure Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .payment-method-active { border-color: #EC4899; background-color: #FFF1F2; }
    </style>
</head>
<body class="bg-gray-50" x-data="checkoutApp()">

    <nav class="bg-white border-b border-gray-100 py-4">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <a href="full-featured-store.html" class="text-xl font-bold tracking-tighter">CASE<span class="text-pink-500">CRAFT</span></a>
            <span class="text-sm text-gray-400">Secure SSL Checkout</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12 sm:px-6 lg:px-8">
        <div class="lg:grid lg:grid-cols-2 lg:gap-x-12 xl:gap-x-16">
            <!-- Left: Shipping & Payment Info -->
            <div>
                <h2 class="text-2xl font-bold text-gray-900 mb-8">Shipping Information</h2>
                
                <form class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">First Name</label>
                            <input type="text" class="mt-1 block w-full border-gray-200 rounded-lg shadow-sm focus:ring-pink-500 focus:border-pink-500 p-3 bg-white border">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Last Name</label>
                            <input type="text" class="mt-1 block w-full border-gray-200 rounded-lg shadow-sm focus:ring-pink-500 focus:border-pink-500 p-3 bg-white border">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Email Address</label>
                        <input type="email" class="mt-1 block w-full border-gray-200 rounded-lg shadow-sm focus:ring-pink-500 focus:border-pink-500 p-3 bg-white border">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Shipping Address</label>
                        <input type="text" class="mt-1 block w-full border-gray-200 rounded-lg shadow-sm focus:ring-pink-500 focus:border-pink-500 p-3 bg-white border">
                    </div>

                    <div class="grid grid-cols-3 gap-4">
                        <div class="col-span-1">
                            <label class="block text-sm font-medium text-gray-700">Country</label>
                            <select class="mt-1 block w-full border-gray-200 rounded-lg shadow-sm focus:ring-pink-500 focus:border-pink-500 p-3 bg-white border">
                                <option>United States</option>
                                <option>United Kingdom</option>
                                <option>Canada</option>
                                <option>Germany</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">City</label>
                            <input type="text" class="mt-1 block w-full border-gray-200 rounded-lg shadow-sm focus:ring-pink-500 focus:border-pink-500 p-3 bg-white border">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Zip Code</label>
                            <input type="text" class="mt-1 block w-full border-gray-200 rounded-lg shadow-sm focus:ring-pink-500 focus:border-pink-500 p-3 bg-white border">
                        </div>
                    </div>
                </form>

                <h2 class="text-2xl font-bold text-gray-900 mt-12 mb-8">Payment Method</h2>
                <div class="space-y-4">
                    <!-- Stripe / Credit Card -->
                    <div @click="paymentMethod = 'stripe'" :class="paymentMethod === 'stripe' ? 'payment-method-active' : 'border-gray-200'" class="border-2 rounded-xl p-4 cursor-pointer flex items-center justify-between transition-all">
                        <div class="flex items-center space-x-4">
                            <div class="bg-blue-600 p-2 rounded-md"><svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"></path></svg></div>
                            <span class="font-bold">Credit / Debit Card</span>
                        </div>
                        <div class="flex space-x-2">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" class="h-4">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" class="h-4">
                        </div>
                    </div>

                    <!-- PayPal -->
                    <div @click="paymentMethod = 'paypal'" :class="paymentMethod === 'paypal' ? 'payment-method-active' : 'border-gray-200'" class="border-2 rounded-xl p-4 cursor-pointer flex items-center justify-between transition-all">
                        <div class="flex items-center space-x-4">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" class="h-6">
                        </div>
                        <span class="text-xs text-blue-600 font-bold italic">Pay with PayPal balance or card</span>
                    </div>
                </div>

                <button @click="processPayment()" class="w-full bg-gray-900 text-white mt-12 py-5 rounded-2xl text-xl font-bold hover:bg-black transition-all shadow-xl flex items-center justify-center space-x-3">
                    <span x-show="!loading" x-text="paymentMethod === 'stripe' ? 'Complete Purchase' : 'Continue to PayPal'"></span>
                    <svg x-show="loading" class="animate-spin h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
            </div>

            <!-- Right: Order Summary -->
            <div class="mt-16 lg:mt-0 bg-white p-8 rounded-3xl border border-gray-100 shadow-sm h-fit sticky top-24">
                <h3 class="text-lg font-bold mb-6">Order Summary</h3>
                <div class="space-y-6">
                    <template x-for="(item, index) in cart" :key="index">
                        <div class="flex items-center space-x-4">
                            <div class="w-20 h-20 bg-gray-100 rounded-xl overflow-hidden relative">
                                <img :src="item.image" class="w-full h-full object-cover">
                                <span class="absolute -top-2 -right-2 bg-gray-900 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold" x-text="item.quantity || 1"></span>
                            </div>
                            <div class="flex-1">
                                <h4 class="font-bold text-gray-900" x-text="item.name"></h4>
                                <p class="text-xs text-gray-500" x-text="item.selectedModel + ' / ' + item.selectedSku.label"></p>
                            </div>
                            <p class="font-bold text-gray-900" x-text="'$' + (item.price * (item.quantity || 1)).toFixed(2)"></p>
                        </div>
                    </template>
                </div>

                <div class="mt-8 pt-8 border-t border-gray-100 space-y-4">
                    <div class="flex justify-between text-gray-500">
                        <span>Subtotal</span>
                        <span x-text="'$' + subtotal()"></span>
                    </div>
                    <div class="flex justify-between text-gray-500">
                        <span>Shipping</span>
                        <span class="text-green-600 font-bold uppercase text-xs">Free</span>
                    </div>
                    <div class="flex justify-between text-xl font-bold text-gray-900 pt-4">
                        <span>Total</span>
                        <span x-text="'$' + subtotal()"></span>
                    </div>
                </div>

                <div class="mt-8 bg-gray-50 p-4 rounded-xl flex items-center space-x-4">
                    <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    <p class="text-xs text-gray-500">Your data is encrypted and secure. We do not store your credit card information.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        function checkoutApp() {
            return {
                cart: JSON.parse(localStorage.getItem('cart') || '[]'),
                paymentMethod: 'stripe',
                loading: false,
                storeDomain: 'uprint-lab-v2.myshopify.com',
                // Shopify variant ID mapping for each product
                variantMap: {
                    '1': '66972919365677', '2': '66972919398445',
                    '3': '66972919431213', '4': '66972919463981',
                    '5': '66972919496749', '6': '66972919529517',
                    '7': '66972919562285', '8': '66972919595053',
                    '9': '66972919627821', '10': '66972919660589',
                    '11': '66972919693357', '12': '66978970828845'
                },
                subtotal() {
                    return this.cart.reduce((total, item) => total + (item.price * (item.quantity || 1)), 0).toFixed(2);
                },
                processPayment() {
                    this.loading = true;
                    // Build real Shopify cart URL with variant IDs
                    const items = this.cart
                        .filter(item => this.variantMap[item.productId])
                        .map(item => this.variantMap[item.productId] + ':' + (item.quantity || 1))
                        .join(',');
                    const checkoutUrl = items 
                        ? 'https://' + this.storeDomain + '/cart/' + items
                        : 'https://' + this.storeDomain + '/cart/';
                    setTimeout(() => {
                        this.loading = false;
                        window.location.href = checkoutUrl;
                    }, 1000);
                }
            }
        }
    </script>
</body>
</html>
