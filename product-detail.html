<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail | CaseCraft AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-white" x-data="detailApp()" x-init="init()">

    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-100">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-tighter italic">CASE<span class="text-purple-500">CRAFT</span></a>
            <div class="flex items-center space-x-6">
                <button @click="window.location.href='checkout.html'" class="relative p-2 bg-purple-50 rounded-full text-purple-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span x-show="cartCount > 0" x-text="cartCount" class="absolute -top-1 -right-1 bg-pink-500 text-white text-[10px] font-bold rounded-full h-4 w-4 flex items-center justify-center"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Dynamic Loader -->
    <div x-show="!product" class="h-screen flex items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-500"></div>
    </div>

    <!-- Product Detail -->
    <main x-show="product" x-cloak class="max-w-7xl mx-auto px-4 py-12 sm:px-6 lg:px-8">
        <div class="lg:grid lg:grid-cols-2 lg:gap-x-12 lg:items-start">
            
            <!-- Image Gallery -->
            <div class="flex flex-col-reverse">
                <div class="mt-6 w-full max-w-2xl mx-auto sm:block lg:max-w-none">
                    <div class="grid grid-cols-5 gap-4">
                        <template x-for="(img, index) in product.gallery" :key="index">
                            <button @click="selectedImage = img" class="relative h-20 bg-gray-100 rounded-lg flex items-center justify-center cursor-pointer overflow-hidden border-2 transition-all" :class="selectedImage === img ? 'border-purple-500' : 'border-transparent'">
                                <img :src="img" class="w-full h-full object-cover">
                            </button>
                        </template>
                    </div>
                </div>
                <div class="w-full aspect-w-1 aspect-h-1">
                    <img :src="selectedImage" class="w-full h-full object-center object-cover sm:rounded-2xl shadow-xl transition-all duration-300 border border-purple-50">
                </div>
            </div>

            <!-- Product Info -->
            <div class="mt-10 px-4 sm:px-0 sm:mt-16 lg:mt-0 text-left">
                <div class="flex justify-between items-start">
                    <div>
                        <h1 class="text-3xl font-black tracking-tight text-gray-900 uppercase" x-text="product.name"></h1>
                        <p class="mt-2 text-sm text-gray-500 font-bold uppercase tracking-widest" x-text="product.series"></p>
                    </div>
                    <div class="text-right">
                        <p class="text-3xl font-black text-purple-600" x-text="'$' + product.price"></p>
                    </div>
                </div>

                <div class="mt-6">
                    <div class="text-base text-gray-600 space-y-4 leading-relaxed">
                        <p x-text="product.description"></p>
                    </div>
                </div>

                <div class="mt-10 border-t border-gray-100 pt-10">
                    <!-- Color / SKU Picker -->
                    <div>
                        <h3 class="text-xs font-black text-gray-400 uppercase tracking-[0.2em] mb-4">Select Style</h3>
                        <div class="mt-4 grid grid-cols-4 gap-4">
                            <template x-for="sku in skus" :key="sku.name">
                                <button @click="selectSku(sku)" class="group relative flex flex-col items-center space-y-2 focus:outline-none">
                                    <div class="w-full aspect-square rounded-2xl overflow-hidden border-2 transition-all duration-300" :class="selectedSku.name === sku.name ? 'border-purple-500 ring-4 ring-purple-100 scale-105 shadow-lg' : 'border-gray-100 hover:border-purple-200'">
                                        <img :src="sku.image" class="w-full h-full object-cover">
                                    </div>
                                    <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter" :class="selectedSku.name === sku.name ? 'text-purple-600' : ''" x-text="sku.label"></span>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Model Picker -->
                    <div class="mt-8">
                        <h3 class="text-xs font-black text-gray-400 uppercase tracking-[0.2em] mb-4">Device Model</h3>
                        <div class="mt-4 grid grid-cols-3 gap-2">
                            <template x-for="model in models" :key="model">
                                <label class="border rounded-xl py-2.5 px-2 flex items-center justify-center text-[10px] font-bold uppercase cursor-pointer transition-all" :class="selectedModel === model ? 'bg-gray-900 text-white border-gray-900 shadow-lg' : 'bg-white text-gray-500 hover:border-purple-200 border-gray-100'">
                                    <input type="radio" name="model" :value="model" x-model="selectedModel" class="sr-only">
                                    <span x-text="model"></span>
                                </label>
                            </template>
                        </div>
                    </div>

                    <!-- Add to Cart -->
                    <div class="mt-10">
                        <button @click="addToCart()" class="w-full bg-purple-600 border-none rounded-[2rem] py-5 px-8 flex items-center justify-center text-lg font-black text-white hover:bg-purple-700 transition-all transform active:scale-95 shadow-2xl shadow-purple-200">
                            Add to Bag
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function detailApp() {
            return {
                cartCount: 0,
                product: null,
                selectedModel: 'iPhone 16 Pro',
                selectedImage: '',
                selectedSku: { name: '', label: '' },
                models: ['iPhone 12', '12 Pro Max', 'iPhone 13', '13 Pro Max', 'iPhone 14', '14 Pro Max', 'iPhone 15', '15 Pro Max', 'iPhone 16', '16 Pro Max', 'iPhone 17', '17 Pro Max'],
                skus: [
                    { name: 'orange', label: 'Orange', image: 'https://henryng808.github.io/casecraft-store/assets/sku-orange.jpg' },
                    { name: 'blue', label: 'Blue', image: 'https://henryng808.github.io/casecraft-store/assets/sku-blue.jpg' },
                    { name: 'green', label: 'Green', image: 'https://henryng808.github.io/casecraft-store/assets/sku-green.jpg' },
                    { name: 'mint', label: 'Mint', image: 'https://henryng808.github.io/casecraft-store/assets/sku-mint.jpg' }
                ],
                database: {
                    '1': { name: 'Ins Contrast Dot Rotate', price: 24.90, series: '360° Rotating Series', description: 'The original 1688 bestseller. Features high-quality contrast color dots and a 360-degree rotating ring stand.', gallery: ['https://henryng808.github.io/casecraft-store/assets/hero.png', 'https://henryng808.github.io/casecraft-store/assets/main1.jpg', 'https://henryng808.github.io/casecraft-store/assets/main2.jpg'] },
                    '2': { name: 'Magnetic Film Polka', price: 22.50, series: 'MagSafe Compatible', description: 'High-strength magnetic alignment with minimalist polka dot pattern. Smooth matte finish.', gallery: ['https://henryng808.github.io/casecraft-store/assets/prod-magnetic.jpg', 'https://henryng808.github.io/casecraft-store/assets/main3.jpg'] },
                    '3': { name: '360° Glitter Stand', price: 19.80, series: 'Sparkle Edition', description: 'Infused with premium glitter and features a built-in rotatable ring for hands-free viewing.', gallery: ['https://henryng808.github.io/casecraft-store/assets/prod-glitter.jpg', 'https://henryng808.github.io/casecraft-store/assets/main4.jpg'] },
                    '4': { name: 'Luxury IMD Ring', price: 34.00, series: 'Premium Edition', description: 'Double-layered IMD technology ensures the pattern never fades. Includes a matching luxury metal ring.', gallery: ['https://henryng808.github.io/casecraft-store/assets/prod-luxury.png', 'https://henryng808.github.io/casecraft-store/assets/main5.jpg'] },
                    '5': { name: 'Milky Blue Matte', price: 21.00, series: 'Soft-Touch Series', description: 'Incredible hand-feel with our unique milky-blue matte coating. Elegant and simple.', gallery: ['https://henryng808.github.io/casecraft-store/assets/prod-milky.jpg', 'https://henryng808.github.io/casecraft-store/assets/main1.jpg'] },
                    '6': { name: 'Diamond IMD Case', price: 26.50, series: 'Fashion Edition', description: '3D Diamond-cut texture meets trendy Korean ins patterns. High-end visual depth.', gallery: ['https://henryng808.github.io/casecraft-store/assets/prod-diamond.jpg', 'https://henryng808.github.io/casecraft-store/assets/main2.jpg'] },
                    '7': { name: 'Minimalist Mirror', price: 28.50, series: 'Selfie Series', description: 'Built-in real mirror face with minimalist polka dot accents. The ultimate tool for content creators.', gallery: ['https://henryng808.github.io/casecraft-store/assets/prod-mirror.png', 'https://henryng808.github.io/casecraft-store/assets/main3.jpg'] },
                    '8': { name: 'Electroplated Silver', price: 31.00, series: 'Luxury Series', description: 'Mirror-finish electroplated purple frame with premium dot pattern. High-shine, low-profile.', gallery: ['https://henryng808.github.io/casecraft-store/assets/prod-silver.jpg', 'https://henryng808.github.io/casecraft-store/assets/main4.jpg'] }
                },
                init() {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id') || '1';
                    this.product = this.database[id];
                    this.selectedImage = this.product.gallery[0];
                    this.selectedSku = this.skus[0];
                    this.cartCount = JSON.parse(localStorage.getItem('cart') || '[]').length;
                },
                selectSku(sku) {
                    this.selectedSku = sku;
                },
                addToCart() {
                    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
                    cart.push({ ...this.product, selectedModel: this.selectedModel, selectedSku: this.selectedSku, image: this.selectedImage, quantity: 1 });
                    localStorage.setItem('cart', JSON.stringify(cart));
                    this.cartCount = cart.length;
                    if(confirm('Added to bag! Go to checkout?')) window.location.href = 'checkout.html';
                }
            }
        }
    </script>
</body>
</html>
