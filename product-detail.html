<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail | CaseCraft Real Series</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-white" x-data="detailApp()" x-init="init()">

    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-100">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3">
                <img src="https://henryng808.github.io/casecraft-store/assets/logo.png" alt="CaseCraft Logo" class="h-8 w-8 rounded-lg shadow-sm">
                <div class="text-2xl font-bold tracking-tighter italic">Case<span class="text-purple-500">Craft</span></div>
            </a>
            <div class="flex items-center space-x-6">
                <button @click="window.location.href='checkout.html'" class="relative p-2 bg-purple-50 rounded-full text-purple-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span x-show="cartCount > 0" x-text="cartCount" class="absolute -top-1 -right-1 bg-pink-500 text-white text-[10px] font-bold rounded-full h-4 w-4 flex items-center justify-center"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Product Detail -->
    <main x-show="product" x-cloak class="max-w-7xl mx-auto px-4 py-12 sm:px-6 lg:px-8">
        <div class="lg:grid lg:grid-cols-2 lg:gap-x-12 lg:items-start">
            
            <!-- Image Gallery -->
            <div class="flex flex-col-reverse">
                <div class="mt-6 w-full max-w-2xl mx-auto sm:block lg:max-w-none">
                    <div class="grid grid-cols-5 gap-4">
                        <template x-for="(img, index) in product.gallery" :key="index">
                            <button @click="selectedImage = img" class="relative h-20 bg-gray-100 rounded-lg flex items-center justify-center cursor-pointer overflow-hidden border-2 transition-all" :class="selectedImage === img ? 'border-purple-500' : 'border-transparent'">
                                <img :src="img" class="w-full h-full object-cover">
                            </button>
                        </template>
                    </div>
                </div>
                <div class="w-full aspect-w-1 aspect-h-1">
                    <img :src="selectedImage" class="w-full h-full object-center object-cover sm:rounded-2xl shadow-xl transition-all duration-300 border border-purple-50">
                </div>
            </div>

            <!-- Product Info -->
            <div class="mt-10 px-4 sm:px-0 sm:mt-16 lg:mt-0 text-left">
                <div class="flex justify-between items-start">
                    <div>
                        <h1 class="text-3xl font-black tracking-tight text-gray-900 uppercase" x-text="product.name"></h1>
                        <div class="mt-2 flex items-center space-x-2">
                            <span class="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-widest">Real Photo Verified</span>
                            <p class="text-sm text-gray-500 font-bold uppercase tracking-widest" x-text="product.series"></p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-3xl font-black text-purple-600" x-text="'$' + product.price"></p>
                    </div>
                </div>

                <div class="mt-6">
                    <div class="text-base text-gray-600 space-y-4 leading-relaxed">
                        <p x-text="product.description"></p>
                    </div>
                </div>

                <div class="mt-10 border-t border-gray-100 pt-10">
                    <!-- SKU Picker -->
                    <div>
                        <h3 class="text-xs font-black text-gray-400 uppercase tracking-[0.2em] mb-4">Select Your Favorite</h3>
                        <div class="mt-4 grid grid-cols-4 gap-4">
                            <template x-for="sku in product.skus" :key="sku.name">
                                <button @click="selectSku(sku)" class="group relative flex flex-col items-center space-y-2 focus:outline-none">
                                    <div class="w-full aspect-square rounded-2xl overflow-hidden border-2 transition-all duration-300" :class="selectedSku.name === sku.name ? 'border-purple-500 ring-4 ring-purple-100 scale-105 shadow-lg' : 'border-gray-100 hover:border-purple-200'">
                                        <img :src="sku.image" class="w-full h-full object-cover">
                                    </div>
                                    <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter" :class="selectedSku.name === sku.name ? 'text-purple-600' : ''" x-text="sku.label"></span>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Model Picker -->
                    <div class="mt-8">
                        <h3 class="text-xs font-black text-gray-400 uppercase tracking-[0.2em] mb-4">Device Model</h3>
                        <div class="mt-4 grid grid-cols-3 gap-2">
                            <template x-for="model in models" :key="model">
                                <label class="border rounded-xl py-2.5 px-2 flex items-center justify-center text-[10px] font-bold uppercase cursor-pointer transition-all" :class="selectedModel === model ? 'bg-gray-900 text-white border-gray-900 shadow-lg' : 'bg-white text-gray-500 hover:border-purple-200 border-gray-100'">
                                    <input type="radio" name="model" :value="model" x-model="selectedModel" class="sr-only">
                                    <span x-text="model"></span>
                                </label>
                            </template>
                        </div>
                    </div>

                    <!-- Add to Cart -->
                    <div class="mt-10">
                        <button @click="addToCart()" class="w-full bg-purple-600 border-none rounded-[2rem] py-5 px-8 flex items-center justify-center text-lg font-black text-white hover:bg-purple-700 transition-all transform active:scale-95 shadow-2xl shadow-purple-200">
                            Add to Bag
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function detailApp() {
            const baseUrl = 'https://henryng808.github.io/casecraft-store/assets/';
            return {
                cartCount: 0,
                product: null,
                selectedModel: 'iPhone 16 Pro',
                selectedImage: '',
                selectedSku: { name: '', label: '', image: '' },
                models: ['iPhone 12', '12 Pro Max', 'iPhone 13', '13 Pro Max', 'iPhone 14', '14 Pro Max', 'iPhone 15', '15 Pro Max', 'iPhone 16', '16 Pro Max', 'iPhone 17', '17 Pro Max'],
                database: {
                    '1': { name: 'Orange Contrast Rotate', price: 24.90, series: '360° Rotating Series', description: 'Genuine IMD craft with bold orange contrast.', gallery: [baseUrl+'sku_orange.jpg', baseUrl+'main_1.jpg', baseUrl+'main_2.jpg'], skus: [{ name: 'orange', label: 'Orange', image: baseUrl+'sku_orange.jpg' }] },
                    '2': { name: 'Blue Contrast Rotate', price: 24.90, series: '360° Rotating Series', description: 'Vibrant blue contrast design.', gallery: [baseUrl+'sku_blue.jpg', baseUrl+'main_3.jpg', baseUrl+'main_4.jpg'], skus: [{ name: 'blue', label: 'Blue', image: baseUrl+'sku_blue.jpg' }] },
                    '3': { name: 'Green Contrast Rotate', price: 24.90, series: '360° Rotating Series', description: 'Deep green contrast theme.', gallery: [baseUrl+'sku_green.jpg', baseUrl+'main_5.jpg', baseUrl+'main_1.jpg'], skus: [{ name: 'green', label: 'Green', image: baseUrl+'sku_green.jpg' }] },
                    '4': { name: 'Mint Contrast Rotate', price: 24.90, series: '360° Rotating Series', description: 'Refreshing mint style.', gallery: [baseUrl+'sku_mint.jpg', baseUrl+'main_2.jpg', baseUrl+'main_4.jpg'], skus: [{ name: 'mint', label: 'Mint', image: baseUrl+'sku_mint.jpg' }] },
                    '5': { name: 'Mirror Bowknot Series', price: 22.80, series: 'Mirror Selfie Edition', description: 'Real mirror face with integrated 3D bowknot detail.', gallery: [baseUrl+'series-mirror-bow.jpg', baseUrl+'main-mirror-1.jpg', baseUrl+'main-mirror-2.jpg'], skus: [{ name: 'silver', label: 'Silver Mirror', image: baseUrl+'sku-mirror-silver.jpg' }, { name: 'clear', label: 'Clear Mirror', image: baseUrl+'sku-mirror-clear.jpg' }] },
                    '6': { name: 'Blue Floral Charm', price: 19.50, series: 'Korean Floral Series', description: 'Hand-painted blue floral patterns.', gallery: [baseUrl+'series-blue-floral.jpg', baseUrl+'main-floral-1.jpg', baseUrl+'main-floral-2.jpg'], skus: [{ name: 'blue-floral', label: 'Blue Floral', image: baseUrl+'sku-floral-blue.jpg' }, { name: 'white-floral', label: 'White Floral', image: baseUrl+'sku-floral-white.jpg' }] },
                    '7': { name: 'Sweet Pink Pearl', price: 26.00, series: 'Premium Romantic', description: 'High-quality romantic pink case.', gallery: [baseUrl+'series-sweet-pink.jpg', baseUrl+'main-pink-1.jpg', baseUrl+'main-pink-2.jpg'], skus: [{ name: 'pearl', label: 'Pearl Pink', image: baseUrl+'sku-pink-pearl.jpg' }, { name: 'shell', label: 'Shell Pink', image: baseUrl+'sku-pink-shell.jpg' }] },
                    '8': { name: 'Checkered Vibe Bow', price: 21.90, series: 'Y2K Retro Series', description: 'Classic pink checkered pattern.', gallery: [baseUrl+'series-checkered-bow.jpg', baseUrl+'main-check-1.jpg', baseUrl+'main-check-2.jpg'], skus: [{ name: 'pink-check', label: 'Pink Check', image: baseUrl+'sku-check-pink.jpg' }, { name: 'blue-check', label: 'Blue Check', image: baseUrl+'sku-check-blue.jpg' }] },
                    '9': { name: 'Smiley Polka Chain', price: 26.50, series: 'Iconic Chain Edition', description: 'Viral 1688 smiley polka dot case with matching decorative bead chain.', gallery: [baseUrl+'prod-smiley-dots.png', baseUrl+'main-smiley-1.jpg', baseUrl+'main-smiley-2.jpg'], skus: [{ name: 'green-smiley', label: 'Green Smiley', image: baseUrl+'sku-smiley-green.jpg' }, { name: 'orange-smiley', label: 'Orange Smiley', image: baseUrl+'sku-smiley-orange.jpg' }] },
                    '10': { name: 'Purple Monster Stand', price: 24.90, series: 'Iconic Monster Edition', description: '3D Purple Monster stand with built-in card holder and stylish braided strap. Authentic 1688 trendy design.', gallery: [baseUrl+'prod-monster-main.jpg', baseUrl+'prod-monster-1.jpg', baseUrl+'prod-monster-2.jpg', baseUrl+'prod-monster-3.jpg', baseUrl+'prod-monster-4.jpg'], skus: [{ name: 'purple-monster', label: 'Purple Monster', image: baseUrl+'sku-monster-purple.jpg' }] },
                    '11': { name: 'Crybaby Polka Love', price: 22.50, series: 'Crybaby Cute Series', description: 'Adorable Crybaby doll stand with polka dot design and side heart detail. Premium soft TPU with air-cushion protection.', gallery: [baseUrl+'prod-crybaby-main.jpg', baseUrl+'prod-crybaby-1.jpg', baseUrl+'prod-crybaby-2.jpg', baseUrl+'prod-crybaby-3.jpg', baseUrl+'prod-crybaby-4.jpg'], skus: [{ name: 'pink-crybaby', label: 'Pink Love', image: baseUrl+'sku-crybaby-pink.jpg' }, { name: 'purple-crybaby', label: 'Purple Love', image: baseUrl+'sku-crybaby-purple.jpg' }, { name: 'blue-crybaby', label: 'Blue Love', image: baseUrl+'sku-crybaby-blue.jpg' }, { name: 'yellow-crybaby', label: 'Yellow Love', image: baseUrl+'sku-crybaby-yellow.jpg' }] },
                    '12': { name: 'Lucky Money Gyro Stand', price: 21.90, series: 'Fortune Gyro Series', description: 'Unique "Lucky Money" spinning top stand with glitter gradient design and rhinestone camera protection.', gallery: [baseUrl+'prod-money-main.jpg', baseUrl+'prod-money-1.jpg', baseUrl+'prod-money-2.jpg', baseUrl+'prod-money-3.jpg', baseUrl+'prod-money-4.jpg'], skus: [{ name: 'orange-money', label: 'Orange Gradient', image: baseUrl+'sku-money-orange.jpg' }, { name: 'purple-money', label: 'Purple Gradient', image: baseUrl+'sku-money-purple.jpg' }, { name: 'pink-money', label: 'Pink Gradient', image: baseUrl+'sku-money-pink.jpg' }, { name: 'blue-money', label: 'Blue Gradient', image: baseUrl+'sku-money-blue.jpg' }, { name: 'gold-money', label: 'Gold Gradient', image: baseUrl+'sku-money-gold.jpg' }, { name: 'black-money', label: 'Black Gradient', image: baseUrl+'sku-money-black.jpg' }, { name: 'silver-money', label: 'Silver Gradient', image: baseUrl+'sku-money-silver.jpg' }] }
                },
                init() {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id') || '1';
                    this.product = this.database[id];
                    this.selectedImage = this.product.gallery[0];
                    this.selectedSku = this.product.skus[0];
                    this.cartCount = JSON.parse(localStorage.getItem('cart') || '[]').length;
                },
                selectSku(sku) {
                    this.selectedSku = sku;
                    this.selectedImage = sku.image;
                },
                addToCart() {
                    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
                    const params = new URLSearchParams(window.location.search);
                    const pid = params.get('id') || '1';
                    cart.push({ ...this.product, productId: pid, selectedModel: this.selectedModel, selectedSku: this.selectedSku, image: this.selectedImage, quantity: 1 });
                    localStorage.setItem('cart', JSON.stringify(cart));
                    this.cartCount = cart.length;
                    if(confirm('Added to bag! Go to checkout?')) window.location.href = 'checkout.html';
                }
            }
        }
    </script>
</body>
</html>
